{% extends 'base/layout.html' %}

{% block title %}Device Type Sync{% endblock %}

{% block content %}
<div class="card">
  <h5 class="card-header">Device Type Sync</h5>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}

      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" name="commit" id="commit">
        <label class="form-check-label" for="commit">
          Commit changes
        </label>
      </div>

      <button type="submit" class="btn btn-primary">
        Run Sync
      </button>
    </form>

    {% if output %}
      <hr>
      <h6>Output</h6>
      <pre style="white-space: pre-wrap;">{{ output }}</pre>
    {% endif %}
  </div>
</div>
{% endblock %}
